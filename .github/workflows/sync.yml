name: Sync Notion data

on:
  schedule:
    # Cada 5 minutos (el mínimo que permite GitHub). GitHub no garantiza el
    # segundo exacto y puede retrasarlo en horas de carga alta, y desactiva
    # el cron automáticamente si el repo lleva 60 días sin actividad (basta
    # con reactivarlo en la pestaña Actions).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Consultar Notion y regenerar data/*.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/sync-notion.mjs

      - name: Commit si hay cambios
        run: |
          git config user.name "solaris-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/docs.json data/datasheets.json data/meta.json data/all.json
          git diff --cached --quiet || git commit -m "chore: sync data from Notion [skip ci]"
          git push
